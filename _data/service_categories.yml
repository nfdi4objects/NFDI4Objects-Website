# NFDI Service Categories (technisch, aus alter Website)
nfdi_categories:
  - id: data-curation
    name_de: "Datenkuration"
    name_en: "Data Curation"
    icon: "fa-database"

  - id: databases
    name_de: "Datenbanken"
    name_en: "Databases"
    icon: "fa-table"

  - id: libraries
    name_de: "Bibliotheken"
    name_en: "Libraries"
    icon: "fa-book"

  - id: storage
    name_de: "Speicherung"
    name_en: "Storage"
    icon: "fa-archive"

  - id: support
    name_de: "Beratung & Support"
    name_en: "Support/Consulting"
    icon: "fa-question-circle"

  - id: tools
    name_de: "Tools & Anwendungen"
    name_en: "Tools/Applications"
    icon: "fa-wrench"

  - id: training
    name_de: "Schulung & Training"
    name_en: "Training"
    icon: "fa-graduation-cap"

  - id: web-apps
    name_de: "Web-Anwendungen"
    name_en: "Web Applications"
    icon: "fa-globe"

  - id: workflows
    name_de: "Workflows & Pipelines"
    name_en: "Workflows/Pipelines"
    icon: "fa-project-diagram"

# Lebenszyklus-Phasen (Navigation)
lifecycle_phases:
  - id: planung
    name_de: "Planung des Forschungsvorhabens"
    name_en: "Planning Research Projects"
    description_de: "Unterstützung bei der Konzeption und Vorbereitung von Projekten"
    description_en: "Support for project conception and preparation"
    url_de: "/services/planning/"
    url_en: "/en/services/planning/"

  - id: erhebung
    name_de: "Erhebung der Daten"
    name_en: "Data Collection"
    description_de: "Werkzeuge für die primäre Datenerfassung im Feld und Labor"
    description_en: "Tools for primary data capture in the field and laboratory"
    url_de: "/services/collection/"
    url_en: "/en/services/collection/"

  - id: verarbeitung
    name_de: "Verarbeitung und Analyse der Daten"
    name_en: "Data Processing and Analysis"
    description_de: "Dienste zur Aufbereitung, Auswertung und Interpretation"
    description_en: "Services for data preparation, evaluation, and interpretation"
    url_de: "/services/processing/"
    url_en: "/en/services/processing/"

  - id: archivierung
    name_de: "Archivierung von Daten"
    name_en: "Data Archiving"
    description_de: "Langfristige und sichere Speicherung von Forschungsdaten"
    description_en: "Long-term and secure storage of research data"
    url_de: "/services/archiving/"
    url_en: "/en/services/archiving/"

  - id: datenzugang
    name_de: "Datenzugang ermöglichen"
    name_en: "Enabling Data Access"
    description_de: "Veröffentlichung und Bereitstellung von Daten nach FAIR-Prinzipien"
    description_en: "Publishing and providing data according to FAIR principles"
    url_de: "/services/access/"
    url_en: "/en/services/access/"

  - id: nachnutzung
    name_de: "Nachnutzung von Daten"
    name_en: "Data Reuse"
    description_de: "Wiederverwendung existierender Daten für neue Fragestellungen"
    description_en: "Reusing existing data for new research questions"
    url_de: "/services/reuse/"
    url_en: "/en/services/reuse/"

  - id: lernen-beraten
    name_de: "Lernen & Beraten"
    name_en: "Learning & Consulting"
    description_de: "Schulungs- und Beratungsangebote sowie Wissensvermittlung"
    description_en: "Training, consulting, and knowledge transfer"
    url_de: "/services/learning-consulting/"
    url_en: "/en/services/learning-consulting/"

# Service-Typen (detaillierter, hierarchisch)
