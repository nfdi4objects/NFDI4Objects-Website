# SPARQL Beispiel-Queries für den NFDI4Objects Knowledge Graph
# Diese Beispiele werden auf der SPARQL-Interface-Seite angezeigt

- title: "Alle Personen auflisten"
  description: "Zeigt alle Personen im Knowledge Graph mit ihren Namen."
  query: |
    PREFIX foaf: <http://xmlns.com/foaf/0.1/>
    PREFIX nfdicore: <https://nfdi.fiz-karlsruhe.de/ontology#>

    SELECT ?person ?name WHERE {
      ?person a nfdicore:Person ;
              foaf:name ?name .
    }
    ORDER BY ?name

- title: "Personen mit ORCID-ID"
  description: "Findet alle Personen, die eine ORCID-ID haben."
  query: |
    PREFIX foaf: <http://xmlns.com/foaf/0.1/>
    PREFIX nfdicore: <https://nfdi.fiz-karlsruhe.de/ontology#>
    PREFIX n4o: <https://nfdi4objects.net/ontology#>

    SELECT ?person ?name ?orcid WHERE {
      ?person a nfdicore:Person ;
              foaf:name ?name ;
              n4o:orcidId ?orcid .
    }
    ORDER BY ?name

- title: "Alle Projekte (Trails)"
  description: "Listet alle Trail-Projekte mit ihren Titeln auf."
  query: |
    PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
    PREFIX nfdicore: <https://nfdi.fiz-karlsruhe.de/ontology#>

    SELECT ?project ?title WHERE {
      ?project a nfdicore:Project ;
               skos:prefLabel ?title .
    }
    ORDER BY ?title

- title: "Personen und ihre Task Areas"
  description: "Zeigt welche Personen in welchen Task Areas arbeiten."
  query: |
    PREFIX foaf: <http://xmlns.com/foaf/0.1/>
    PREFIX nfdicore: <https://nfdi.fiz-karlsruhe.de/ontology#>
    PREFIX n4o: <https://nfdi4objects.net/ontology#>

    SELECT ?person ?name ?taskArea WHERE {
      ?person a nfdicore:Person ;
              foaf:name ?name ;
              n4o:worksIn ?taskArea .
    }
    ORDER BY ?name

