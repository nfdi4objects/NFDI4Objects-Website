  # Einfache Service-Typen (für Abwärtskompatibilität)
  - id: repository
    name_de: "Repositorium"
    name_en: "Repository"

  - id: database
    name_de: "Datenbank"
    name_en: "Database"

  - id: api
    name_de: "API / Schnittstelle"
    name_en: "API / Interface"

  - id: tool
    name_de: "Software-Tool"
    name_en: "Software Tool"

  - id: webapp
    name_de: "Web-Anwendung"
    name_en: "Web Application"

  - id: consulting
    name_de: "Beratungsangebot"
    name_en: "Consulting Service"

  - id: training
    name_de: "Schulungsangebot"
    name_en: "Training Service"

  - id: infrastructure
    name_de: "Infrastruktur"
    name_en: "Infrastructure"

  - id: standard
    name_de: "Standard / Vokabular"
    name_en: "Standard / Vocabulary"

